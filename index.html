            align-items: center;

            border-radius: 50%;

            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #06b6d4;
            font-size: 12px;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.6);

        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 900;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
        }
        
        .tab-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(34, 211, 238, 0.3);
            color: #9ca3af;
            cursor: pointer;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        .tab-btn.active {

            color: #06b6d4;
            border-color: rgba(34, 211, 238, 0.6);
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

            }
            header {
                flex-direction: column;
            }
        }

            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 0.75rem;
            padding: 1.5rem;

        .card h2 {
            font-size: 1.125rem;
            color: #06b6d4;
            margin-bottom: 1rem;
        }
        
        input, select {
            width: 100%;
            padding: 0.75rem;
            background: #111827;
            border: 1px solid rgba(34, 211, 238, 0.3);
            color: #fff;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
        }
        
        .team-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
        }
        
        .team-slot {
            aspect-ratio: 1;
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            text-align: center;
            position: relative;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .team-slot:hover {
            border-color: rgba(34, 211, 238, 0.5);
            background: #374151;
        }
        
        .team-slot.empty {
            color: #4b5563;
            font-size: 1.5rem;
        }
        
        .team-slot.filled {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(34, 211, 238, 0.2));
            border-color: rgba(34, 211, 238, 0.5);
        }
        
        .unit-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .unit-emoji {
            font-size: 1.5rem;
        }
        
        .unit-name {

            font-weight: 600;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        
        .unit-cost {
            color: #fbbf24;
            font-weight: bold;
            font-size: 0.75rem;
        }

            top: 2px;
            right: 2px;
            background: #dc2626;
            color: #fff;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .team-slot.filled:hover .delete-btn {

        }

            </div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('builder')">🛠️ Builder</button>
            <button class="tab-btn" onclick="switchTab('meta')">📊 Meta</button>
            <button class="tab-btn" onclick="switchTab('items')">🔧 Items</button>
        </div>
    </header>

    <main>
        <!-- Builder Tab -->
        <div id="builder" class="tab-content active">
            <div class="container">
                <!-- Team Builder -->
                <div>
                    <div class="card">
                        <h2>👥 Your Team (<span id="teamCount">0</span>/8)</h2>
                        <input type="text" id="teamName" placeholder="Team name...">
                        <div class="team-grid" id="teamGrid"></div>
                        <div class="traits-section hidden" id="traitsSection">
                            <h3>Trait Synergies</h3>
                            <div class="traits-list" id="traitsList"></div>
                        </div>
                        <div class="cost-summary hidden" id="costSummary">
                            Total Cost: <span id="totalCost">0</span>⭐
                        </div>
                        <button class="action-btn" onclick="saveTeam()">💾 Save Team</button>
                    </div>
                </div>

                <!-- Unit Library -->
                <div>
                    <div class="card">
                        <h2>⚔️ Units</h2>
                        <div class="search-box">
                            <input type="text" id="searchBox" placeholder="Search..." onkeyup="filterUnits()">
                        </div>
                        <select id="traitFilter" onchange="filterUnits()">
                            <option value="all">All Traits</option>
                        </select>
                        <div class="unit-list" id="unitList"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Meta Tab -->
        <div id="meta" class="tab-content">
            <div class="container" style="grid-template-columns: 1fr;">
                <div class="card">
                    <h2>📊 Meta Tier List</h2>
                    <div id="metaList"></div>
                </div>
            </div>
        </div>

        <!-- Items Tab -->

                <div class="card">
                    <h2>🔧 Items (Set 16)</h2>
                    <div id="itemsList"></div>
                </div>
            </div>
        </div>
    </main>

                // 7-COST
                { id: 92, name: "Aurelion Sol", cost: 7, traits: ["Targon", "Star Forger"], img: "⭐" },
                { id: 93, name: "Baron Nashor", cost: 7, traits: ["Void", "Riftscourge"], img: "👑" },

            traits: [
                "Arcanist", "Assassin", "Bilgewater", "Bruiser", "Defender", "Demacia", 
                "Disruptor", "Duelist", "Freljord", "Gunslinger", "Invoker", "Ionia", "Ixtal",
                "Juggernaut", "Longshot", "Noxus", "Piltover", "Quickstriker", "Shadow Isles",
                "Shurima", "Slayer", "Targon", "Void", "Warden", "Zaun", "Yordle"
            ],
            metaComps: [
                { name: "Reaper Carries", rating: "S", wr: 54.2, pr: 18.5, units: "Aatrox, Darius, Draven", desc: "Powerful physical damage" },
                { name: "Arcanist Control", rating: "S", wr: 52.8, pr: 16.3, units: "Annie, Azir, Zilean", desc: "Spell-focused AP scaling" },
                { name: "Void Carry", rating: "A", wr: 50.5, pr: 14.2, units: "Belveth, Kai'Sa, Kalista", desc: "High burst damage" },
                { name: "Ionia Slayers", rating: "A", wr: 49.8, pr: 12.1, units: "Yone, Yasuo, Ahri", desc: "Fast attacking composition" },
                { name: "Bruiser Frontline", rating: "A", wr: 48.2, pr: 11.5, units: "Braum, Shyvana, Volibear", desc: "Tanky durability" },
            ],
            items: [
                { name: "Infinity Force", desc: "Gain Critical Strike damage" },
                { name: "Rabadon's Deathcap", desc: "Massive Ability Power boost" },

                { name: "Hand of Justice", desc: "Abilities can critically strike" },
                { name: "Liandry's Torment", desc: "Magic Penetration & spell damage" },
                { name: "Adaptive Helm", desc: "Block ability damage" },
                { name: "Gargoyle's Stoneplate", desc: "Additional resistances" },
                { name: "Frozen Heart", desc: "Enemies attack slower" },
                { name: "Ionic Spark", desc: "Deal magic damage when hit" },
                { name: "Warmog's Armor", desc: "Out-of-combat health regen" },
                { name: "Zhonya's Hourglass", desc: "Become invulnerable at low health" },
                { name: "Morellonomicon", desc: "Grievous wounds on spells" },
            ]
        };

        let currentTeam = [];
        let savedTeams = JSON.parse(localStorage.getItem('tftTeams') || '[]');

        function init() {
            renderTeamGrid();
            filterUnits();
            populateTraitFilter();
            loadMetaComps();
            loadItems();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function renderTeamGrid() {
            const grid = document.getElementById('teamGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const slot = document.createElement('div');
                slot.className = currentTeam[i] ? 'team-slot filled' : 'team-slot empty';
                if (currentTeam[i]) {
                    slot.innerHTML = `
                        <div class="unit-info">
                            <div class="unit-emoji">${currentTeam[i].img}</div>
                            <div class="unit-name">${currentTeam[i].name}</div>
                            <div class="unit-cost">${currentTeam[i].cost}⭐</div>
                        </div>
                        <button class="delete-btn" onclick="deleteUnit(${i})">×</button>
                    `;
                } else {
                    slot.textContent = '+';
                }
                grid.appendChild(slot);
            }
            document.getElementById('teamCount').textContent = currentTeam.length;
            updateTraits();
            updateCost();
        }

        function populateTraitFilter() {
            const filter = document.getElementById('traitFilter');
            tftData.traits.forEach(trait => {
                const option = document.createElement('option');
                option.value = trait;
                option.textContent = trait;
                filter.appendChild(option);
            });
        }

        function filterUnits() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const trait = document.getElementById('traitFilter').value;
            let units = tftData.champions;
            if (trait !== 'all') units = units.filter(u => u.traits.includes(trait));
            if (search) units = units.filter(u => u.name.toLowerCase().includes(search));

            const list = document.getElementById('unitList');
            list.innerHTML = '';
            units.forEach(unit => {
                const btn = document.createElement('button');
                btn.className = 'unit-btn';
                btn.disabled = currentTeam.length >= 8;
                btn.onclick = () => addUnit(unit);
                btn.innerHTML = `
                    <span>${unit.img}</span>
                    <div class="unit-btn-content">
                        <div class="unit-btn-name">${unit.name}</div>
                        <div class="unit-btn-traits">${unit.traits.join(', ')}</div>
                    </div>
                    <span class="unit-btn-cost">${unit.cost}⭐</span>
                `;
                list.appendChild(btn);
            });
        }

        function addUnit(unit) {
            if (currentTeam.length < 8) {
                currentTeam.push(unit);
                renderTeamGrid();
                filterUnits();
            }
        }

        function deleteUnit(i) {
            currentTeam.splice(i, 1);
            renderTeamGrid();
            filterUnits();
        }

        function updateTraits() {
            const traits = {};
            currentTeam.forEach(u => u.traits.forEach(t => traits[t] = (traits[t] || 0) + 1));
            const section = document.getElementById('traitsSection');
            const list = document.getElementById('traitsList');
            if (Object.keys(traits).length > 0) {
                section.classList.remove('hidden');
                list.innerHTML = '';
                Object.entries(traits).sort((a, b) => b[1] - a[1]).forEach(([t, c]) => {
                    const badge = document.createElement('div');
                    badge.className = 'trait-badge';
                    badge.textContent = `${t} ×${c}`;
                    list.appendChild(badge);
                });
            } else {
                section.classList.add('hidden');
            }
        }

        function updateCost() {
            const cost = currentTeam.reduce((s, u) => s + u.cost, 0);
            const summary = document.getElementById('costSummary');
            if (currentTeam.length > 0) {
                summary.classList.remove('hidden');
                document.getElementById('totalCost').textContent = cost;
            } else {
                summary.classList.add('hidden');
            }
        }

        function saveTeam() {
            const name = document.getElementById('teamName').value;
            if (!name || currentTeam.length === 0) {
                alert('Please name your team and add units');
                return;
            }
            const traits = {};
            currentTeam.forEach(u => u.traits.forEach(t => traits[t] = (traits[t] || 0) + 1));
            savedTeams.unshift({
                id: Date.now(),
                name: name,
                units: currentTeam,
                traits: Object.entries(traits),
                timestamp: new Date().toLocaleDateString(),
                cost: currentTeam.reduce((s, u) => s + u.cost, 0)
            });
            localStorage.setItem('tftTeams', JSON.stringify(savedTeams));
            alert('✅ Team saved!');
            document.getElementById('teamName').value = '';
            currentTeam = [];
            renderTeamGrid();
        }

        function loadMetaComps() {
            const list = document.getElementById('metaList');
            list.innerHTML = '';
            tftData.metaComps.forEach(comp => {
                const div = document.createElement('div');
                div.className = 'meta-comp';
                div.innerHTML = `
                    <div class="tier-badge tier-${comp.rating.toLowerCase()}">${comp.rating}</div>
                    <div class="comp-name">${comp.name}</div>
                    <div class="comp-units">${comp.units}</div>
                    <div class="comp-desc">${comp.desc}</div>
                    <div class="comp-stats">
                        <span class="comp-wr">${comp.wr}% WR</span>
                        <span class="comp-pr">${comp.pr}% Pick</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function loadItems() {
            const list = document.getElementById('itemsList');
            list.innerHTML = '';
            tftData.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `<div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div>`;
                list.appendChild(div);
            });
        }

        init();
    </script>
