            gap: 1rem;

            font-weight: 900;
            letter-spacing: -1px;

            font-weight: 900;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        .logo-text p {
            font-size: 0.75rem;
            color: #d1d5db;
            font-weight: 300;
            margin: 0;

        .status-badge {

            background: rgba(0, 0, 0, 0.6);

            font-size: 0.75rem;
            font-weight: 600;
            color: #4ade80;

        .tabs {

            gap: 0.5rem;

            border: 1px solid rgba(34, 211, 238, 0.5);
        }

            margin: 0 auto;
            padding: 2rem 1.5rem;

            grid-template-columns: 1fr 1fr 1fr;
            gap: 2rem;

            color: #d1d5db;

            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;

        .team-slot:hover {
            border-color: rgba(34, 211, 238, 0.5);

        }

            font-size: 0.75rem;

            background: #1f2937;

                flex-wrap: wrap;

                        <button class="save-btn" onclick="saveTeam()">💾 Save Team to Device</button>

                <!-- Unit Library Column -->

                            </select>
                        </div>

                        <div class="unit-list" id="unitList"></div>
                    </div>
                </div>
            </div>
        </div>

        // State
        let currentTeam = [];
        let savedTeams = JSON.parse(localStorage.getItem('tftTeams') || '[]');

        // Initialize
        function init() {
            renderTeamGrid();
            renderUnitList();
            populateTraitFilter();
            loadMetaComps();
            loadItems();
            updateOnlineStatus();
        }

        function updateOnlineStatus() {
            const badge = document.querySelector('.status-badge');
            if (navigator.onLine) {
                badge.textContent = '✓ Offline Ready';
            } else {
                badge.textContent = '📴 Offline Mode';
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function renderTeamGrid() {
            const grid = document.getElementById('teamGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 8; i++) {
                const slot = document.createElement('div');
                slot.className = 'team-slot';
                
                if (currentTeam[i]) {
                    slot.classList.add('filled');
                    slot.innerHTML = `
                        <div class="unit-card">
                            <div class="unit-emoji">${currentTeam[i].img}</div>
                            <div class="unit-name">${currentTeam[i].name}</div>
                            <div class="unit-cost">${currentTeam[i].cost}⭐</div>
                        </div>
                        <button class="delete-btn" onclick="deleteUnit(${i})">×</button>
                    `;
                } else {
                    slot.innerHTML = '+';
                }
                grid.appendChild(slot);
            }

            document.getElementById('teamCount').textContent = currentTeam.length;
            updateTraitSynergies();
            updateCostSummary();
        }

        function populateTraitFilter() {
            const filter = document.getElementById('traitFilter');
            filter.innerHTML = '<option value="all">All Traits</option>';

            const traits = [...new Set(tftData.champions.flatMap(u => u.traits))];
            traits.sort().forEach(trait => {
                const option = document.createElement('option');
                option.value = trait;
                option.textContent = trait;
                filter.appendChild(option);
            });
        }

        function filterUnits() {
            renderFiltered();
        }

        function renderFiltered() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const trait = document.getElementById('traitFilter').value;

            let units = tftData.champions;
            
            if (trait !== 'all') {
                units = units.filter(u => u.traits.includes(trait));
            }
            if (search) {
                units = units.filter(u => u.name.toLowerCase().includes(search));
            }

            const list = document.getElementById('unitList');
            list.innerHTML = '';

            units.forEach(unit => {
                const btn = document.createElement('button');
                btn.className = 'unit-btn';
                btn.disabled = currentTeam.length >= 8;
                btn.onclick = () => addUnit(unit);
                btn.innerHTML = `
                    <span>${unit.img}</span>
                    <div class="unit-btn-content">
                        <div class="unit-btn-name">${unit.name}</div>
                        <div class="unit-btn-traits">${unit.traits.join(', ')}</div>
                    </div>
                    <span class="unit-btn-cost">${unit.cost}⭐</span>
                `;
                list.appendChild(btn);
            });
        }

        function addUnit(unit) {
            if (currentTeam.length < 8) {
                currentTeam.push({ ...unit });
                renderTeamGrid();
                renderFiltered();
            }
        }

        function deleteUnit(index) {
            currentTeam.splice(index, 1);
            renderTeamGrid();
            renderFiltered();
        }

        function updateTraitSynergies() {
            const traits = {};
            currentTeam.forEach(unit => {
                unit.traits.forEach(trait => {
                    traits[trait] = (traits[trait] || 0) + 1;
                });
            });

            const traitsSection = document.getElementById('traitsSection');
            const traitsList = document.getElementById('traitsList');

            if (Object.keys(traits).length > 0) {
                traitsSection.classList.remove('hidden');
                traitsList.innerHTML = '';

                Object.entries(traits)
                    .sort((a, b) => b[1] - a[1])
                    .forEach(([trait, count]) => {
                        const badge = document.createElement('div');
                        badge.className = 'trait-badge';
                        const desc = tftData.traits.find(t => t.name === trait);
                        badge.textContent = `${trait} ×${count}`;
                        badge.title = desc ? desc.description : '';
                        traitsList.appendChild(badge);
                    });
            } else {
                traitsSection.classList.add('hidden');
            }
        }

        function updateCostSummary() {
            const costSummary = document.getElementById('costSummary');
            const totalCost = currentTeam.reduce((sum, u) => sum + u.cost, 0);

            if (currentTeam.length > 0) {
                costSummary.classList.remove('hidden');
                document.getElementById('totalCost').textContent = `${totalCost}`;
            } else {
                costSummary.classList.add('hidden');
            }
        }

        function saveTeam() {
            const name = document.getElementById('teamName').value;
            if (!name || currentTeam.length === 0) {
                alert('Please name your team and add at least one unit');
                return;
            }

            const traits = {};
            currentTeam.forEach(unit => {
                unit.traits.forEach(trait => {
                    traits[trait] = (traits[trait] || 0) + 1;
                });
            });

            const newTeam = {
                id: Date.now(),
                name: name,
                units: currentTeam,
                traits: Object.entries(traits),
                timestamp: new Date().toLocaleDateString(),
                cost: currentTeam.reduce((sum, u) => sum + u.cost, 0),
            };

            savedTeams.unshift(newTeam);
            localStorage.setItem('tftTeams', JSON.stringify(savedTeams));

            alert('✅ Team saved!');
            document.getElementById('teamName').value = '';
            currentTeam = [];
            renderTeamGrid();
        }

        function loadMetaComps() {
            const list = document.getElementById('metaList');
            list.innerHTML = '';

            tftData.metaComps.forEach(comp => {
                const tierClass = `tier-${comp.rating.toLowerCase()}`;
                const div = document.createElement('div');
                div.className = 'meta-comp';
                div.innerHTML = `
                    <div style="overflow: auto;">
                        <div class="tier-badge ${tierClass}">${comp.rating}</div>
                        <div class="comp-name">${comp.name}</div>
                        <div class="comp-units">Units: ${comp.units.join(', ')}</div>
                        <div style="font-size: 0.875rem; color: #d1d5db; margin-top: 0.5rem;">${comp.description}</div>
                        <div class="comp-stats" style="clear: both;">
                            <span class="comp-wr">${comp.winRate}% WR</span>
                            <span class="comp-pr">${comp.pickRate}% Pick</span>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function loadItems() {
            const list = document.getElementById('itemsList');
            list.innerHTML = '<p style="color: #d1d5db; font-size: 0.875rem;">Set 16 includes 50+ items. For full item details with recipes and combinations, visit tftset16.com/items</p>';
            
            const itemsByType = {
                'Popular Completed Items': tftData.items.filter(i => i.type === 'completed').slice(0, 15)
            };

            Object.entries(itemsByType).forEach(([category, items]) => {
                const categoryDiv = document.createElement('div');
                categoryDiv.style.marginTop = '1.5rem';
                
                const title = document.createElement('h3');
                title.textContent = category;
                title.style.color = '#06b6d4';
                title.style.marginBottom = '1rem';
                title.style.fontSize = '0.875rem';
                title.style.fontWeight = '700';
                categoryDiv.appendChild(title);

                items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.style.padding = '0.75rem';
                    itemDiv.style.background = 'rgba(59, 130, 246, 0.1)';
                    itemDiv.style.border = '1px solid rgba(59, 130, 246, 0.3)';
                    itemDiv.style.borderRadius = '0.5rem';
                    itemDiv.style.marginBottom = '0.5rem';
                    itemDiv.style.fontSize = '0.875rem';
                    
                    itemDiv.innerHTML = `
                        <div style="font-weight: 600; color: #fff;">${item.name}</div>
                        <div style="color: #d1d5db; margin-top: 0.25rem;">${item.description}</div>
                    `;
                    categoryDiv.appendChild(itemDiv);
                });

                list.appendChild(categoryDiv);
            });
        }

        init();
    </script>
